name: Build Maven CI Image

on:
  push:
    branches: [master]
    paths:
      - 'docker_build/maven/**'
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: ensure corporate CA placeholder exists
        run: touch docker_build/maven/corporate-root-ca.pem

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push
        uses: docker/build-push-action@v5
        with:
          context: docker_build/maven
          push: true
          tags: mockserver/mockserver:maven
          cache-from: type=gha
          cache-to: type=gha,mode=max
