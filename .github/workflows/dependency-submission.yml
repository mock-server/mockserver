name: Automatic Dependency Submission

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  submit-maven:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Submit Maven dependencies
        uses: advanced-security/maven-dependency-submission-action@v4
        with:
          directory: ${{ github.workspace }}/mockserver
