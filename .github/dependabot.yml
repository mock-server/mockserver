version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/mockserver"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "java"
    ignore:
      # Java 11 compatibility - block upgrades requiring Java 17+
      - dependency-name: "org.springframework:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.apache.tomcat.embed:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.eclipse.jetty:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "io.prometheus:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.networknt:json-schema-validator"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.puppycrawl.tools:checkstyle"
        update-types: ["version-update:semver-major"]
      - dependency-name: "net.javacrumbs.json-unit:json-unit-core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.jayway.jsonpath:json-path"
        update-types: ["version-update:semver-major"]
      # Block Jakarta EE 9+ (requires Java 17+)
      - dependency-name: "jakarta.xml.bind:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jakarta.activation:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jakarta.validation:*"
        update-types: ["version-update:semver-major"]
      # Block servlet namespace migration
      - dependency-name: "javax.servlet:*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "maven"
    directory: "/mockserver-maven-plugin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "java"
      - "maven-plugin"

  - package-ecosystem: "npm"
    directory: "/mockserver-ui"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
      - "ui"

  - package-ecosystem: "npm"
    directory: "/mockserver-client-node"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "npm"
    directory: "/mockserver-node"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "pip"
    directory: "/mockserver-client-python"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "bundler"
    directory: "/mockserver-client-ruby"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ruby"

  - package-ecosystem: "npm"
    directory: "/.opencode"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
