steps:
  - label: ":lint-roller: opencode config"
    command: ".buildkite/scripts/steps/infra-validate-config.sh"
    timeout_in_minutes: 5

  - label: ":bash: validate shell scripts"
    command: ".buildkite/scripts/steps/infra-validate-scripts.sh"
    timeout_in_minutes: 5

  - label: ":docker: validate Dockerfile sync"
    command: ".buildkite/scripts/steps/docker-validate-sync.sh"
    timeout_in_minutes: 5

  - label: ":helm: validate Helm charts"
    command: ".buildkite/scripts/steps/helm-validate.sh"
    timeout_in_minutes: 5
