steps:
  - label: ":react: UI lint and typecheck"
    command: "cd mockserver-ui && npm ci && npm run lint && npm run typecheck"
    plugins:
      - docker#v5.13.0:
          image: "node:22"
    timeout_in_minutes: 10

  - label: ":jest: UI tests"
    command: "cd mockserver-ui && npm ci && npm test"
    plugins:
      - docker#v5.13.0:
          image: "node:22"
    timeout_in_minutes: 10

  - label: ":package: UI build"
    command: "cd mockserver-ui && npm ci && npm run build"
    plugins:
      - docker#v5.13.0:
          image: "node:22"
    timeout_in_minutes: 10
