steps:
  - input: "Release Parameters"
    fields:
      - text: "Release Version"
        key: "release-version"
        hint: "e.g., 6.0.0"
        required: true
        format: "[0-9]+\\.[0-9]+\\.[0-9]+"
      - text: "Next SNAPSHOT Version"
        key: "next-version"
        hint: "e.g., 6.0.1-SNAPSHOT"
        required: true
        format: "[0-9]+\\.[0-9]+\\.[0-9]+-SNAPSHOT"
      - select: "Release Type"
        key: "release-type"
        default: "full"
        options:
          - label: "Full Release (all steps)"
            value: "full"
          - label: "Maven Central Only"
            value: "maven-only"
          - label: "Docker Image Only (re-publish)"
            value: "docker-only"
          - label: "Post-Maven (Docker, npm, Helm, docs — skip Maven Central)"
            value: "post-maven"
      - select: "Create Versioned Site?"
        key: "create-versioned-site"
        default: "no"
        options:
          - label: "No"
            value: "no"
          - label: "Yes (major/minor release)"
            value: "yes"

  - block: ":lock: TOTP Authorization"
    prompt: "Enter your TOTP code to authorize this release"
    allowed_teams: ["release-managers"]
    fields:
      - text: "TOTP Code"
        key: "totp-code"
        hint: "6-digit code from your authenticator app"
        required: true
        format: "[0-9]{6}"

  - label: ":shield: Verify TOTP"
    command: "scripts/ci/release/verify-totp.sh"
    agents:
      queue: "release"

  - wait

  - label: ":pipeline: Upload Release Steps"
    command: "scripts/ci/release/upload-release-steps.sh"
    agents:
      queue: "release"
